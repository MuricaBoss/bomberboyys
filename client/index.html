<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>Bomber Boys (1000 Players)</title>
    <script>
      window.addEventListener("error", function(e) {
        fetch("/log", { method: "POST", body: "[CLIENT-ERROR] " + e.message + " @ " + e.filename + ":" + e.lineno });
      });
      window.addEventListener("unhandledrejection", function(e) {
        fetch("/log", { method: "POST", body: "[CLIENT-PROMISE] " + (e.reason && e.reason.stack ? e.reason.stack : (e.reason && e.reason.message ? e.reason.message : String(e.reason))) });
      });
    </script>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        user-select: none;
      }
      #game-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
